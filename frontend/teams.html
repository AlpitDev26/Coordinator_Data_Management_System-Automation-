<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams — TIC Club System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/dashboard.css">
</head>
<body>
<div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">
                <div class="brand-icon"><i class="fa-solid fa-database"></i></div>
                <div>
                    <div class="brand-name">TIC CLUB</div>
                    <div class="brand-sub">DATA MANAGEMENT SYSTEM</div>
                </div>
            </div>
        </div>
        <nav>
            <div class="nav-section">
                <div class="nav-label">Core</div>
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
                <a href="students.html"  class="nav-item"><i class="fa-solid fa-user-graduate"></i> Students</a>
                <a href="teams.html"     class="nav-item active"><i class="fa-solid fa-users"></i> Teams</a>
                <a href="events.html"    class="nav-item"><i class="fa-solid fa-calendar-days"></i> Events</a>
                <a href="attendance.html"class="nav-item"><i class="fa-solid fa-clipboard-check"></i> Attendance</a>
            </div>
            <div class="nav-section">
                <div class="nav-label">Analytics</div>
                <a href="reports.html" class="nav-item"><i class="fa-solid fa-chart-bar"></i> Reports</a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="user-mini">
                <div class="user-avatar" id="avatarInitial">A</div>
                <div class="user-info">
                    <div class="name" id="sidebarUsername">Admin</div>
                    <div class="role">ROLE_ADMIN</div>
                </div>
                <button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <header class="topbar">
            <span class="page-title">TEAM MANAGEMENT</span>
            <div class="topbar-search">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search teams...">
            </div>
            <div class="topbar-actions">
                <div class="topbar-icon"><i class="fa-regular fa-bell"></i></div>
            </div>
        </header>

        <div class="page-content">
            <div class="section-header" style="margin-bottom:20px;">
                <span class="section-title">All Teams</span>
                <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Create Team</button>
            </div>

            <div class="table-card glass">
                <div class="table-toolbar">
                    <span class="text-muted" style="font-size:13px;">Teams: <span id="totalCount" class="text-cyan">0</span></span>
                    <div style="margin-left:auto;">
                        <button class="btn btn-outline" style="padding:8px 15px; font-size:12px;" onclick="loadTeams()">
                            <i class="fa-solid fa-rotate"></i> Refresh
                        </button>
                    </div>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Team Name</th>
                            <th>Description</th>
                            <th>Members</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="teamsBody">
                        <tr><td colspan="5" style="text-align:center;color:var(--text3);padding:40px;">Loading teams...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- ADD/EDIT TEAM MODAL -->
<div class="modal-overlay" id="teamModal">
    <div class="modal" style="max-width:560px;">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">CREATE TEAM</span>
            <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form id="teamForm" novalidate>
            <div class="form-grid">
                <div class="input-group full">
                    <label>Team Name</label>
                    <input class="input-field" type="text" id="teamName" placeholder="e.g. Web Development Core" required>
                </div>
                <div class="input-group full">
                    <label>Description</label>
                    <textarea class="input-field" id="description" placeholder="What this team does..." rows="3" style="resize:vertical;"></textarea>
                </div>
                
                <div class="input-group full">
                    <label>Select Members</label>
                    <div id="studentCheckboxes" class="glass" style="max-height: 200px; overflow-y: auto; padding: 15px; border-radius: var(--radius); margin-top: 5px;">
                        <!-- Checkboxes will be rendered here -->
                        <div class="text-muted" style="font-size:12px;">Loading students...</div>
                    </div>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary" id="saveTeamBtn">
                    <i class="fa-solid fa-floppy-disk"></i> Save Team
                </button>
            </div>
        </form>
    </div>
</div>

<script src="./assets/js/api.js"></script>
<script src="./assets/js/teams.js"></script>
</body>
</html>
